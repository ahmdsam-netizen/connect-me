services:
  app:
    build: 
      context: .
      dockerfile: Dockerfile 
    container_name: connect-me-application
    environment:
      DATABASE_URL: ${DATABASE_URL}
    env_file:
      - .env.local
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:alpine
    container_name: connect-db
    restart: always 
    environment:
      POSTGRES_USER: sayem
      POSTGRES_PASSWORD: sayemahmad
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:                                     
      test: ["CMD-SHELL", "pg_isready -U sayem -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres-data:
